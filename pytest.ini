[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -q

# `auto` means a bare `async def test_...` just runs -- no @pytest.mark.asyncio
# on every test. The orchestrator is async top to bottom.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

filterwarnings =
    ignore::DeprecationWarning
